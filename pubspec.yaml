name: deskilo
description: "Free, privacy-first coworking community app — visual desk booking plus the community money layer."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management (ADR 0001) — Riverpod 3 with codegen only
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^4.0.2

  # Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Routing
  go_router: ^17.3.0

  # Theming (spec §14)
  flex_color_scheme: ^8.1.0

  # Local storage (ADR 0001)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking
  dio: ^5.10.0

  # i18n (ADR 0007)
  intl: ^0.20.2
  supabase_flutter: ^2.15.4
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  qr_flutter: ^4.1.0
  flutter_zxing: ^2.3.0
  shared_preferences: ^2.5.5
  share_plus: ^13.2.0
  unifiedpush: ^6.2.0

  # Bill PDF export (#133) — pure Dart, F-Droid clean. Deliberately NOT the
  # `printing` package: it pulls platform channels we don't need.
  pdf: ^3.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  riverpod_generator: ^4.0.2
  riverpod_lint: ^3.1.3
  mocktail: ^1.0.4
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    # Roboto (Apache-2.0, copied from the Flutter SDK) embedded into the
    # bill PDF: base-14 PDF fonts cannot encode '€'/'−' (#133).
    - assets/fonts/
