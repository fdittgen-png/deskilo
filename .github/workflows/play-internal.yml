name: play-internal

# Builds a signed release AAB and starts an internal-testing release.
#   gh workflow run play-internal.yml -f ref=master
# The AAB is always attached as a run artifact. The Play upload step runs
# only when PLAY_STORE_SERVICE_ACCOUNT_JSON exists AND the app entry has
# been created in the Play Console (app creation has no API — owner step).

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag or SHA to build
        required: false
        default: master

env:
  FLUTTER_VERSION: "3.41.9"

jobs:
  bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # secrets context is not allowed in step-level `if`; bridge via env
      HAS_PLAY_SA: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: No-GMS audit (ADR 0003)
        run: bash scripts/audit_no_gms.sh

      - name: Restore upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.p12
          cat > android/key.properties << EOF
          storeFile=upload-keystore.p12
          storeType=PKCS12
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build signed AAB
        run: |
          flutter pub get
          flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: deskilo-release-aab-${{ github.sha }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload to Play internal track
        if: ${{ env.HAS_PLAY_SA == 'true' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: de.deskilo.app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          whatsNewDirectory: distribution/whatsnew
