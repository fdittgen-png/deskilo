name: android-boot

# App-start validation on a real Android emulator (#86/#87):
# Installs the R8-shrunk RELEASE apk on an emulator, launches it with
# am start -W and asserts the process stays alive — the exact #86 failure
# mode, proven to catch it. (The debug integration test was dropped from CI:
# its second gradle build + JIT app on a software-rendered emulator blew two
# job timeouts; integration_test/app_boot_test.dart remains for on-device
# runs via `flutter test integration_test -d <device>`.)

on:
  push:
    branches: [master]
    paths:
      - 'lib/main.dart'
      - 'lib/app/**'
      - 'lib/core/**'
      - 'android/**'
      - 'pubspec.*'
      - 'integration_test/**'
      - '.github/workflows/android-boot.yml'
  workflow_dispatch:

concurrency:
  group: android-boot-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.9"

jobs:
  boot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Build release APK (R8-shrunk, debug-signed fallback)
        run: |
          flutter pub get
          flutter build apk --release --target-platform android-x64

      # AVD snapshot caching (#93): a cold emulator boot costs ~8-10 min;
      # the cached snapshot brings later runs down to ~2 min
      # (reactivecircus/android-emulator-runner documented pattern).
      - name: Cache AVD snapshot
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-34-pixel6

      - name: Create AVD snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "AVD snapshot created"

      - name: Boot checks on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # The release-launch aliveness check runs FIRST — it is the #86
          # regression guard and needs only the already-built apk; the
          # slower integration test (its own debug gradle build) follows.
          # Diagnostics: logcat is cleared right before a deterministic
          # `am start -W` launch, and the FULL log is saved for the
          # artifact step on failure (a filtered -t tail lost the crash).
          script: |
            adb install -r build/app/outputs/flutter-apk/app-release.apk
            adb logcat -c
            adb shell am start -W -n de.deskilo.app/.MainActivity
            sleep 15
            adb logcat -d > launch-logcat.txt
            adb shell pidof de.deskilo.app || { echo "::error::release build crashed at launch (#86 regression) - full logcat in the launch-logcat artifact"; grep -iE "AndroidRuntime|FATAL|deskilo" launch-logcat.txt | tail -80; exit 1; }
            echo "release build is alive after launch"

      - name: Upload launch logcat
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: launch-logcat
          path: launch-logcat.txt
          if-no-files-found: ignore
          retention-days: 7
