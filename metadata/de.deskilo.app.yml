# SPDX-License-Identifier: MIT
# fdroiddata recipe DRAFT for the official F-Droid submission (Epic #10).
# Submit as a merge request to https://gitlab.com/fdroid/fdroiddata once the
# first tagged release exists. Mirrors the Sparkilo recipe pattern.
Categories:
  - Time
  - Money
License: MIT
AuthorName: Florian DITTGEN
AuthorEmail: fdittgen@gmail.com
SourceCode: https://github.com/fdittgen-png/deskilo
IssueTracker: https://github.com/fdittgen-png/deskilo/issues
Changelog: https://github.com/fdittgen-png/deskilo/releases

AutoName: DesKilo
Summary: Coworking community app — desk booking and shared money, libre

RepoType: git
Repo: https://github.com/fdittgen-png/deskilo.git

Builds:
  - versionName: TODO-first-release
    versionCode: 1
    commit: vTODO-first-release
    subdir: .
    submodules: false
    sudo:
      - apt-get update
      - apt-get install -y openjdk-17-jdk-headless
    output: build/app/outputs/flutter-apk/app-release.apk
    srclibs:
      - flutter@3.41.9
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - bash scripts/audit_no_gms.sh
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
      - $$flutter$$/bin/flutter build apk --release

AutoUpdateMode: Version
UpdateCheckMode: Tags ^v[0-9.]+$
CurrentVersion: TODO-first-release
CurrentVersionCode: 1
